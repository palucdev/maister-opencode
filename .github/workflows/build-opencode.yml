name: Build OpenCode Variant
on:
  push:
    branches: [master, beta]
    paths: ['plugins/maister/**', 'platforms/opencode/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build OpenCode variant
        run: make build-opencode

      - name: Validate build
        run: make validate-opencode

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/maister-opencode/ package.json
          git diff --cached --quiet || (git commit -m "Rebuild OpenCode variant" && git push)
